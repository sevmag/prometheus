name: Publish Docker images

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Image tag / release version (e.g. v2.0)"
        required: true
        type: string
      variant:
        description: "Which image(s) to build and push"
        required: true
        default: "both"
        type: choice
        options:
          - cpu
          - gpu
          - both
      sm_arch:
        description: "CUDA SM architecture for the GPU image (default: 89 = Ada Lovelace)"
        required: false
        default: "89"
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/prometheus

jobs:
  # ─── CPU image ─────────────────────────────────────────────────────────────
  cpu:
    name: Build & push CPU image
    if: ${{ inputs.variant == 'cpu' || inputs.variant == 'both' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push CPU image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: container/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ inputs.version }}

  # ─── GPU image ─────────────────────────────────────────────────────────────
  gpu:
    name: Build & push GPU image
    if: ${{ inputs.variant == 'gpu' || inputs.variant == 'both' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push GPU image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: container/Dockerfile.gpu
          push: true
          build-args: |
            SM_ARCH=${{ inputs.sm_arch }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.version }}-gpu
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest-gpu
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ inputs.version }}-gpu
            org.opencontainers.image.description=Prometheus GPU (SM ${{ inputs.sm_arch }})
