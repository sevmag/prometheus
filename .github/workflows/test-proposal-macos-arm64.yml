name: Test dependencies on macOS arm64
# Minor change
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/test-proposal-macos-arm64.yml

jobs:
  test-proposal:
    runs-on: macos-14  # M1, arm64
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PROPOSAL in a plain venv
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install proposal

      - name: Test import
        run: |
          source .venv/bin/activate
          python -c "import proposal; print('PROPOSAL OK:', proposal.__version__)"

  test-leptoninjector:
    runs-on: macos-14  # M1, arm64
    steps:
      - uses: actions/checkout@v4

      - name: Install C++ dependencies via Homebrew
        run: brew install cmake hdf5 boost boost-python3 eigen gsl pkg-config cfitsio

      - name: Build and install photospline
        run: |
          git clone https://github.com/icecube/photospline.git /tmp/photospline
          cmake -S /tmp/photospline -B /tmp/photospline/build \
            -DCMAKE_INSTALL_PREFIX=/usr/local
          cmake --build /tmp/photospline/build -j$(sysctl -n hw.logicalcpu)
          sudo cmake --install /tmp/photospline/build

      - name: Create venv from Homebrew Python
        run: |
          /opt/homebrew/bin/python3 -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip numpy

      - name: Build LeptonInjector
        run: |
          source .venv/bin/activate
          SRC_DIR="$PWD/resources/LeptonInjector"
          TMP_DIR=$(mktemp -d)
          mkdir -p "$TMP_DIR/build"
          cd "$TMP_DIR/build"

          NJOBS=$(sysctl -n hw.logicalcpu)
          PYTHON_PREFIX=$(python -c "import sys; print(sys.base_prefix)")
          PYTHON_VER=$(python -c "import sys; print(f'{sys.version_info.major}.{sys.version_info.minor}')")
          PYTHON_LIB=$(find "$PYTHON_PREFIX" -name "libpython${PYTHON_VER}.dylib" | head -1)
          PYTHON_INC=$(python -c "import sysconfig; print(sysconfig.get_path('include'))")
          echo "Python prefix: $PYTHON_PREFIX  lib: $PYTHON_LIB"

          cmake \
            -DCMAKE_INSTALL_PREFIX="$VIRTUAL_ENV" \
            -DPython_EXECUTABLE="$VIRTUAL_ENV/bin/python" \
            -DPYTHON_EXECUTABLE="$VIRTUAL_ENV/bin/python" \
            -DPYTHON_LIBRARY="$PYTHON_LIB" \
            -DPYTHON_INCLUDE_DIR="$PYTHON_INC" \
            -DCMAKE_INSTALL_RPATH="$VIRTUAL_ENV/lib;/opt/homebrew/lib;/usr/local/lib" \
            -DCMAKE_BUILD_WITH_INSTALL_RPATH=ON \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            "$SRC_DIR"

          make -j"$NJOBS"
          make install

      - name: Test import
        run: |
          source .venv/bin/activate
          python -c "import LeptonInjector; print('LeptonInjector OK')"
