name: Test dependencies on macOS arm64
# Minor change
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/test-proposal-macos-arm64.yml

jobs:
  test-proposal:
    if: false
    runs-on: macos-14  # M1, arm64
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PROPOSAL in a plain venv
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install proposal

      - name: Test import
        run: |
          source .venv/bin/activate
          python -c "import proposal; print('PROPOSAL OK:', proposal.__version__)"

  test-leptoninjector:
    runs-on: macos-14  # M1, arm64
    steps:
      - uses: actions/checkout@v4

      - name: Set up micromamba environment
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: environment.yml
          init-shell: bash

      - name: Build LeptonInjector
        shell: bash -el {0}
        run: |
          SRC_DIR="$PWD/resources/LeptonInjector"
          TMP_DIR=$(mktemp -d)
          mkdir -p "$TMP_DIR/build"
          cd "$TMP_DIR/build"

          NJOBS=$(sysctl -n hw.logicalcpu)

          cmake \
            -DCMAKE_INSTALL_PREFIX="$CONDA_PREFIX" \
            -DPython_EXECUTABLE="$CONDA_PREFIX/bin/python" \
            -DPYTHON_EXECUTABLE="$CONDA_PREFIX/bin/python" \
            -DCMAKE_INSTALL_RPATH="$CONDA_PREFIX/lib" \
            -DCMAKE_BUILD_WITH_INSTALL_RPATH=ON \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            "$SRC_DIR"

          make -j"$NJOBS"
          make install

      - name: Diagnose LeptonInjector linking
        shell: bash -el {0}
        run: |
          SO=$(find "$CONDA_PREFIX" -name "LeptonInjector.so" | head -1)
          echo "=== .so path: $SO ==="
          otool -L "$SO"
          echo "=== conda lib (relevant) ==="
          ls "$CONDA_PREFIX/lib/" | grep -iE "lepton|boost|photospline|python"
          echo "=== architecture ==="
          file "$SO"
          file "$CONDA_PREFIX/lib/libboost_python312.dylib"
          file "$CONDA_PREFIX/lib/libpython3.12.dylib"
          echo "=== python binary ==="
          which python && python --version
          file "$(which python)"
          echo "=== dylib loading ==="
          DYLD_PRINT_LIBRARIES=1 python -c "import LeptonInjector" 2>&1 | head -60 || true

      - name: Test import (lldb backtrace)
        shell: bash -el {0}
        run: |
          lldb --batch \
            -o "run" \
            -o "bt" \
            -o "quit" \
            -- python -c "import faulthandler; faulthandler.enable(); import LeptonInjector" \
            2>&1 || true

      - name: Check crash reports
        if: always()
        run: |
          ls ~/Library/Logs/DiagnosticReports/ 2>/dev/null && \
            cat ~/Library/Logs/DiagnosticReports/python*.ips 2>/dev/null | head -80 || \
            echo "No crash reports found"
