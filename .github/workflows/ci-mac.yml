name: CI macOS

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - install_mac.sh
      - scripts/install_leptoninjector_mac.sh
      - scripts/install_proposal.sh
      - scripts/check_install.sh
      - scripts/fixes.sh
      - scripts/activate.sh
      - resources/LeptonInjector/**
      - resources/fennel/**
      - pyproject.toml
  pull_request:
    branches: [main]
    paths:
      - install_mac.sh
      - scripts/install_leptoninjector_mac.sh
      - scripts/install_proposal.sh
      - scripts/check_install.sh
      - scripts/fixes.sh
      - scripts/activate.sh
      - resources/LeptonInjector/**
      - resources/fennel/**
      - pyproject.toml

jobs:
  install:
    name: Full install on macOS arm64
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run macOS installer
        run: bash install_mac.sh

      - name: Run test suite
        run: |
          source scripts/activate.sh .prometheus_env
          python -m pytest --tb=short -q
