# Prometheus TOML configuration — water (olympus) example
# Load with: PrometheusConfig.from_toml("examples/water_config.toml")

[run]
run_number = 1
random_state_seed = 1
nevents = 10
storage_prefix = "./output/"

[detector]
geo_file = "resources/geofiles/demo_water.geo"

[injection]
name = "LeptonInjector"

[injection.lepton_injector.simulation]
is_ranged = false
final_state_1 = "MuMinus"
final_state_2 = "Hadrons"
minimal_energy = 1000.0
maximal_energy = 1000000.0
